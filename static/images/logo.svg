<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60">
  <defs>
    <!-- Градиент для основного элемента -->
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    
    <!-- Тень для объема -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Основной символ - стилизованная буква "В" в виде дороги/пути -->
  <g filter="url(#shadow)">
    <!-- Дорога/путь - основа логотипа -->
    <path d="M10 50 L10 15 Q10 5 25 5 L45 5 Q60 5 60 20 L60 35 Q60 50 45 50 L25 50 Q10 50 10 35 Z" 
          fill="url(#logoGradient)" stroke="#1e3a8a" stroke-width="2"/>
    
    <!-- Вторая часть буквы "В" -->
    <path d="M35 20 L55 20 Q65 20 65 30 L65 35 Q65 45 55 45 L35 45" 
          fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Стилизованные колеса/шестеренки (символ техники и обслуживания) -->
    <circle cx="20" cy="48" r="6" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
    <circle cx="20" cy="48" r="3" fill="#fef3c7"/>
    
    <circle cx="50" cy="48" r="6" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
    <circle cx="50" cy="48" r="3" fill="#fef3c7"/>
    
    <!-- Динамические линии (скорость, движение) -->
    <path d="M65 15 L75 10" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <path d="M68 25 L80 22" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <path d="M65 35 L75 38" stroke="#2563eb" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  </g>
  
  <!-- Название компании -->
  <text x="85" y="42" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
        fill="#1e3a8a" letter-spacing="2">ВЕРСА</text>
  
  <!-- Подпись (теглайн) -->
  <text x="87" y="55" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" letter-spacing="1">
    СИСТЕМА УЧЁТА ТО
  </text>
</svg>
